design:
  theme: classic
  page:
    size: us-letter
    top_margin: 0.5in
    bottom_margin: 0.5in
    left_margin: 0.5in
    right_margin: 0.5in
    show_footer: false
    show_top_note: false
  colors:
    name: rgb(0, 79, 144)
    headline: rgb(0, 79, 144)
    connections: rgb(0, 79, 144)
    section_titles: rgb(0, 79, 144)
    links: rgb(0, 79, 144)
  typography:
    font_family:
      body: Source Sans 3
      name: Source Sans 3
      headline: Source Sans 3
      connections: Source Sans 3
      section_titles: Source Sans 3
    font_size:
      body: 10pt
    line_spacing: 0.4em
    alignment: left
  header:
    alignment: center
    space_below_name: 0.3cm
    space_below_headline: 0.3cm
    space_below_connections: 0.3cm
    connections:
      show_icons: true
  section_titles:
    space_above: 0.3cm
    space_below: 0.15cm
  sections:
    space_between_regular_entries: 0.6em
    space_between_text_based_entries: 0.2em
    show_time_spans_in: []
  entries:
    degree_width: 3cm
    date_and_location_width: 4.5cm
    space_between_columns: 0.05cm
    side_space: 0.1cm
